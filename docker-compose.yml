services:
  web:
    image: nginx:1.27-alpine
    container_name: lab6_web  # Добавьте явное имя
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - lab6_network
    restart: always  # Добавьте автоматический перезапуск

  php:
    build: .
    container_name: lab6_php
    volumes:
      - ./www:/var/www/html
    depends_on:
      - elasticsearch
    networks:
      - lab6_network
    restart: always

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: lab6_elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    networks:
      - lab6_network
    restart: always

networks:
  lab6_network:
    driver: bridge